<p-toast />

<main class="app-shell">
  <header class="hero">
    <div class="hero__copy">
      <h1>Shopify Product Importer</h1>
      <p class="hero__subtitle">{{ i18n.t('appSubtitle') }}</p>
    </div>

    <div class="language-switch" [attr.aria-label]="i18n.t('languageLabel')">
      @for (language of i18n.languages; track language.code) {
        <button
          type="button"
          class="language-switch__option"
          [class.language-switch__option--active]="i18n.isLanguage(language.code)"
          [attr.aria-pressed]="i18n.isLanguage(language.code)"
          (click)="i18n.setLanguage(language.code)"
        >
          <span>{{ language.shortLabel }}</span>
          <small>{{ language.label }}</small>
        </button>
      }
    </div>
  </header>

  <section class="grid">
    <app-shopify-config />
    <app-file-import />
  </section>

  <app-import-result />
</main>
